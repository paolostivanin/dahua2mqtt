# ─── MQTT broker ──────────────────────────────────────────────────
mqtt:
  host: "192.168.1.x"       # broker IP or hostname
  port: 1883
  # username: ""
  # password: ""

# ─── Cameras ─────────────────────────────────────────────────────
# List every camera name prefix used in your IVS rule names.
# For a rule named "cam1_r1_h_trip", the prefix is "cam1".
# Four HA binary sensors are created per camera:
#   tripwire vehicle, tripwire human, intrusion vehicle, intrusion human.
cameras:
  - cam1
  - cam2

# ─── HTTP listener (receives events from Dahua NVR) ─────────────
port: 8080

# ─── Security ────────────────────────────────────────────────────
# Restrict incoming requests to these source IPs.
# Empty list (default) = allow all.
# allowed_ips:
#   - "192.168.1.100"
#   - "10.0.0.5"

# Set to true if behind a reverse proxy, to check X-Forwarded-For header.
# trust_proxy: false

# When trust_proxy is true, X-Forwarded-For is only honored if the immediate
# client IP appears in this list. Leave empty to fall back to "loopback or
# RFC1918/ULA private addresses only" (suitable for most LAN setups).
# Set explicitly when running behind a reverse proxy on a public IP.
# trusted_proxies:
#   - "192.168.1.1"

# ─── Logging ─────────────────────────────────────────────────────
logfile: "/var/log/dahua2mqtt/dahua2mqtt.log"
log_level: "INFO"          # DEBUG / INFO / WARNING / ERROR

# ─── Event handling ──────────────────────────────────────────────
# Suppress repeated events per rule name within this window (seconds).
# 0 = disabled. Each rule is tracked independently.
anti_dither: 0

# ─── HA sensor auto-off ─────────────────────────────────────────
# Seconds before a binary sensor switches back to OFF after detection.
off_delay: 10
